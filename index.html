<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kulturfest</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 500px;
      padding: 30px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
      color: #cdda00;
    }

    p {
      margin-bottom: 35px;
      color: #ccc;
      font-size: 18px;
    }

    .button {
      display: block;
      width: 100%;
      padding: 18px;
      margin: 15px 0;
      font-size: 20px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 12px;
      transition: 0.2s ease;
      box-sizing: border-box;
    }

    .menu-button {
      background: #cdda00;
      color: #111;
    }

    .feedback-button {
      background: #6ed0e0;
      color: #111;
    }

    .button:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    .footer {
      margin-top: 35px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Sindelfingen Hisar Kermes</h1>
    <p>Willkommen! Bitte wähle eine Option aus.</p>

    <a class="button menu-button" href="kermes menü.pdf" target="_blank">
      Speisekarte / Menü
    </a>

    <a class="button feedback-button" href="https://docs.google.com/forms/d/e/1FAIpQLSeEfszcg9w7xDyXyicf3DloeW8O1r2zGxUCEoG0ALvsz9YupQ/viewform?usp=dialog" target="_blank">
      Feedback
    </a>

    <div class="footer">
      Sindelfingen Hisar Camii Üniversitesi Yurdu
    </div>
  </div>
</body>
</html>
